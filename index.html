<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parents' Evening Scheduler</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f0f7f0; min-height: 100vh; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    select option { background: #ffffff; color: #1a3a1a; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #e8f5e8; }
    ::-webkit-scrollbar-thumb { background: #4a9e4a; border-radius: 3px; }
    input::placeholder { color: #9ab89a; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const BAND_LABELS = [
      "3:30–4:00pm",
      "4:00–4:30pm",
      "4:30–5:00pm",
      "5:00–5:20pm",
    ];

    const SLOT_TIMES = [
      ["3:30pm","3:40pm","3:50pm"],
      ["4:00pm","4:10pm","4:20pm"],
      ["4:30pm","4:40pm","4:50pm"],
      ["5:00pm","5:10pm","5:20pm"],
    ];

    const DAYS = ["Wed 25th", "Thu 26th"];
    const DAY_OPTIONS = ["Either day", "Wed 25th March", "Thu 26th March"];
    const BAND_OPTIONS = ["Any time", ...BAND_LABELS];

    const RANK_STYLE = {
      1:    { bg: "#d1fae5", color: "#065f46", border: "#6ee7b7" },
      2:    { bg: "#dbeafe", color: "#1e40af", border: "#93c5fd" },
      3:    { bg: "#fef9c3", color: "#92400e", border: "#fde68a" },
      null: { bg: "#f1f5f9", color: "#475569", border: "#cbd5e1" },
    };

    const DEFAULT_TYPE = "F2F";
    const DEFAULT_PREF = { rank: null, day: 0, band: null };
    const DAY_INDEXES = DAYS.map((_, idx) => idx);
    const BAND_INDEXES = SLOT_TIMES.map((_, idx) => idx);
    const TOTAL_SLOTS = DAY_INDEXES.length * SLOT_TIMES.reduce((sum, slots) => sum + slots.length, 0);
    const RANK_WEIGHT = { 1: 3000, 2: 2000, 3: 1000, null: 400 };
    const SCORE_OFFSET = 5000;

    function makeId() {
      if (typeof crypto !== "undefined" && typeof crypto.randomUUID === "function")
        return crypto.randomUUID();
      return `pupil-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function createEmptyPref() {
      return { ...DEFAULT_PREF };
    }

    function normalizePrefRank(value) {
      const num = Number(value);
      return num === 1 || num === 2 || num === 3 ? num : null;
    }

    function normalizePrefDay(value) {
      const num = Number(value);
      return num === 0 || num === 1 || num === 2 ? num : 0;
    }

    function normalizePrefBand(value) {
      if (value === null || value === "" || value === undefined) return null;
      const num = Number(value);
      return num === 0 || num === 1 || num === 2 || num === 3 ? num : null;
    }

    function sanitizePref(pref) {
      if (!pref || typeof pref !== "object") return null;
      return {
        rank: normalizePrefRank(pref.rank),
        day: normalizePrefDay(pref.day),
        band: normalizePrefBand(pref.band),
      };
    }

    function normalizePrefs(rawPrefs) {
      const prefs = Array.isArray(rawPrefs) ? rawPrefs : [];
      const unique = [];
      const seen = new Set();

      for (const pref of prefs) {
        const clean = sanitizePref(pref);
        if (!clean) continue;
        const key = `${clean.rank ?? "null"}-${clean.day}-${clean.band ?? "any"}`;
        if (seen.has(key)) continue;
        seen.add(key);
        unique.push(clean);
      }

      return unique.length > 0 ? unique : [createEmptyPref()];
    }

    function normalizeType(value) {
      return value === "Tel" ? "Tel" : DEFAULT_TYPE;
    }

    function normalizePupil(rawPupil) {
      if (!rawPupil || typeof rawPupil !== "object") return null;
      const name = typeof rawPupil.name === "string" ? rawPupil.name.trim() : "";
      if (!name) return null;

      const id = typeof rawPupil.id === "string" && rawPupil.id.trim() ? rawPupil.id.trim() : makeId();
      return {
        id,
        name,
        type: normalizeType(rawPupil.type),
        prefs: normalizePrefs(rawPupil.prefs),
      };
    }

    function normalizePupils(rawPupils) {
      const pupils = Array.isArray(rawPupils) ? rawPupils : [];
      const seenIds = new Set();
      const normalized = [];

      for (const rawPupil of pupils) {
        const pupil = normalizePupil(rawPupil);
        if (!pupil) continue;
        let id = pupil.id;
        while (seenIds.has(id)) id = makeId();
        seenIds.add(id);
        normalized.push({ ...pupil, id });
      }

      return normalized;
    }

    function slotKey(day, band, slot) {
      return `${day}-${band}-${slot}`;
    }

    function allSlots() {
      const slots = [];
      for (const day of DAY_INDEXES)
        for (const band of BAND_INDEXES)
          for (let slot = 0; slot < SLOT_TIMES[band].length; slot++)
            slots.push({ day, band, slot, key: slotKey(day, band, slot) });
      return slots;
    }
    const ALL_SLOTS = allSlots();
    const SLOT_INDEX_BY_KEY = new Map(ALL_SLOTS.map((slot, idx) => [slot.key, idx]));

    function preferencePriority(rank) {
      if (rank === 1) return 4;
      if (rank === 2) return 3;
      if (rank === 3) return 2;
      return 1;
    }

    function preferenceScore(rank, band, slot) {
      const timeBonus = 120 - (band * 30 + slot * 10);
      return (RANK_WEIGHT[rank] ?? RANK_WEIGHT.null) + timeBonus;
    }

    function availabilityFromPrefs(prefs) {
      const bestBySlot = new Map();

      for (const pref of normalizePrefs(prefs)) {
        const days = pref.day === 0 ? DAY_INDEXES : [pref.day - 1];
        const bands = pref.band === null ? BAND_INDEXES : [pref.band];

        for (const day of days)
          for (const band of bands)
            for (let slot = 0; slot < SLOT_TIMES[band].length; slot++) {
              const key = slotKey(day, band, slot);
              const prev = bestBySlot.get(key);
              if (!prev || preferencePriority(pref.rank) > preferencePriority(prev.rank))
                bestBySlot.set(key, { key, day, band, slot, rank: pref.rank });
            }
      }

      return [...bestBySlot.values()];
    }

    // Successive shortest augmenting path (min-cost max-flow):
    // maximize number of placed pupils, then maximize total preference score.
    function createMinCostMaxFlow(nodeCount) {
      const graph = Array.from({ length: nodeCount }, () => []);

      function addEdge(from, to, cap, cost) {
        const fwd = { to, rev: graph[to].length, cap, cost };
        const rev = { to: from, rev: graph[from].length, cap: 0, cost: -cost };
        graph[from].push(fwd);
        graph[to].push(rev);
        return fwd;
      }

      function solve(source, sink, maxFlow = Infinity) {
        let flow = 0;
        let cost = 0;
        const potential = Array(nodeCount).fill(0);

        while (flow < maxFlow) {
          const dist = Array(nodeCount).fill(Infinity);
          const prevNode = Array(nodeCount).fill(-1);
          const prevEdge = Array(nodeCount).fill(-1);
          const used = Array(nodeCount).fill(false);
          dist[source] = 0;

          for (let i = 0; i < nodeCount; i++) {
            let v = -1;
            for (let n = 0; n < nodeCount; n++) {
              if (used[n]) continue;
              if (v === -1 || dist[n] < dist[v]) v = n;
            }

            if (v === -1 || dist[v] === Infinity) break;
            used[v] = true;

            const edges = graph[v];
            for (let e = 0; e < edges.length; e++) {
              const edge = edges[e];
              if (edge.cap <= 0) continue;
              const nextDist = dist[v] + edge.cost + potential[v] - potential[edge.to];
              if (nextDist < dist[edge.to]) {
                dist[edge.to] = nextDist;
                prevNode[edge.to] = v;
                prevEdge[edge.to] = e;
              }
            }
          }

          if (dist[sink] === Infinity) break;

          for (let n = 0; n < nodeCount; n++)
            if (dist[n] < Infinity) potential[n] += dist[n];

          let add = maxFlow - flow;
          for (let v = sink; v !== source; v = prevNode[v]) {
            const edge = graph[prevNode[v]][prevEdge[v]];
            if (edge.cap < add) add = edge.cap;
          }

          if (add <= 0 || !Number.isFinite(add)) break;

          for (let v = sink; v !== source; v = prevNode[v]) {
            const edge = graph[prevNode[v]][prevEdge[v]];
            edge.cap -= add;
            graph[v][edge.rev].cap += add;
            cost += add * edge.cost;
          }
          flow += add;
        }

        return { flow, cost };
      }

      return { addEdge, solve };
    }

    function allocate(pupils) {
      const schedule = {};
      const result = {};

      if (!Array.isArray(pupils) || pupils.length === 0)
        return { result, schedule };

      const source = 0;
      const pupilStart = 1;
      const slotStart = pupilStart + pupils.length;
      const sink = slotStart + ALL_SLOTS.length;
      const network = createMinCostMaxFlow(sink + 1);
      const matchEdgesById = new Map();

      for (let i = 0; i < pupils.length; i++) {
        result[pupils[i].id] = null;
        network.addEdge(source, pupilStart + i, 1, 0);
      }

      for (let i = 0; i < ALL_SLOTS.length; i++)
        network.addEdge(slotStart + i, sink, 1, 0);

      for (let i = 0; i < pupils.length; i++) {
        const pupil = pupils[i];
        const edges = [];
        const availableSlots = availabilityFromPrefs(pupil.prefs);

        for (const option of availableSlots) {
          const slotIdx = SLOT_INDEX_BY_KEY.get(option.key);
          if (slotIdx === undefined) continue;
          const score = preferenceScore(option.rank, option.band, option.slot);
          const cost = SCORE_OFFSET - score;
          const edge = network.addEdge(pupilStart + i, slotStart + slotIdx, 1, cost);
          edges.push({ edge, option });
        }

        matchEdgesById.set(pupil.id, edges);
      }

      network.solve(source, sink, Math.min(pupils.length, ALL_SLOTS.length));

      for (const pupil of pupils) {
        const edges = matchEdgesById.get(pupil.id) || [];
        for (const { edge, option } of edges) {
          if (edge.cap === 0) {
            result[pupil.id] = option;
            schedule[option.key] = pupil.id;
            break;
          }
        }
      }

      return { result, schedule };
    }

    function App() {
      const [pupils, setPupils] = useState([]);
      const [view, setView] = useState("input");
      const [name, setName] = useState("");
      const [type, setType] = useState(DEFAULT_TYPE);
      const [prefs, setPrefs] = useState([createEmptyPref()]);
      const [editingId, setEditingId] = useState(null);
      const [saveMsg, setSaveMsg] = useState("");

      function resetForm() {
        setName("");
        setType(DEFAULT_TYPE);
        setPrefs([createEmptyPref()]);
      }

      function saveData() {
        const json = JSON.stringify({ pupils }, null, 2);
        const blob = new Blob([json], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "parents_evening_data.json";
        a.click();
        URL.revokeObjectURL(url);
        setSaveMsg("✓ Saved!");
        setTimeout(() => setSaveMsg(""), 2000);
      }

      function loadData(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          try {
            const data = JSON.parse(ev.target.result);
            const rawPupils = Array.isArray(data) ? data : (data && Array.isArray(data.pupils) ? data.pupils : null);
            if (!rawPupils) throw new Error("Invalid data format");
            const normalized = normalizePupils(rawPupils);
            setPupils(normalized);
            setEditingId(null);
            resetForm();
            const dropped = rawPupils.length - normalized.length;
            const loadedLabel = `slip${normalized.length === 1 ? "" : "s"}`;
            const skippedLabel = `invalid entr${dropped === 1 ? "y" : "ies"} skipped`;
            setSaveMsg(
              dropped > 0
                ? `✓ Loaded ${normalized.length} ${loadedLabel} (${dropped} ${skippedLabel})`
                : `✓ Loaded ${normalized.length} ${loadedLabel}`
            );
            setTimeout(() => setSaveMsg(""), 2500);
          } catch {
            setSaveMsg("⚠ Could not read file");
            setTimeout(() => setSaveMsg(""), 3000);
          }
        };
        reader.readAsText(file);
        e.target.value = "";
      }

      const { result: allocation } = allocate(pupils);

      function buildGrid() {
        const grid = {};
        pupils.forEach(p => {
          const slot = allocation[p.id];
          if (slot) grid[slot.key] = { id: p.id, name: p.name, type: p.type };
        });
        return grid;
      }

      const grid = buildGrid();
      const placed = pupils.filter(p => allocation[p.id]);
      const unplaced = pupils.filter(p => !allocation[p.id]);

      function addPref() {
        setPrefs(prev => [...prev, createEmptyPref()]);
      }

      function removePref(i) {
        setPrefs(prev => {
          const updated = prev.filter((_, idx) => idx !== i);
          return updated.length > 0 ? updated : [createEmptyPref()];
        });
      }

      function updatePref(i, field, val) {
        setPrefs(prev => {
          if (!prev[i]) return prev;
          const updated = [...prev];
          if (field === "rank") updated[i] = { ...updated[i], rank: normalizePrefRank(val) };
          if (field === "day") updated[i] = { ...updated[i], day: normalizePrefDay(val) };
          if (field === "band") updated[i] = { ...updated[i], band: normalizePrefBand(val) };
          return updated;
        });
      }

      function submitPupil() {
        const trimmedName = name.trim();
        if (!trimmedName) return;

        const pupil = {
          id: editingId || makeId(),
          name: trimmedName,
          type: normalizeType(type),
          prefs: normalizePrefs(prefs),
        };

        setPupils(prev => {
          if (!editingId) return [...prev, pupil];
          let updatedExisting = false;
          const updated = prev.map(existing => {
            if (existing.id !== editingId) return existing;
            updatedExisting = true;
            return pupil;
          });
          return updatedExisting ? updated : [...updated, pupil];
        });

        setEditingId(null);
        resetForm();
      }

      function editPupil(pupilId) {
        const pupil = pupils.find(p => p.id === pupilId);
        if (!pupil) return;
        setName(pupil.name);
        setType(normalizeType(pupil.type));
        setPrefs(normalizePrefs(pupil.prefs));
        setEditingId(pupilId);
        setView("input");
      }

      function cancelEdit() {
        setEditingId(null);
        resetForm();
      }

      function deletePupil(pupilId) {
        setPupils(prev => prev.filter(p => p.id !== pupilId));
        if (editingId === pupilId) cancelEdit();
      }

      const inp = {
        background: "#ffffff",
        border: "1px solid #b8d8b8",
        borderRadius: "8px",
        padding: "0.5rem 0.75rem",
        color: "#1a3a1a",
        fontSize: "0.9rem",
        outline: "none",
        fontFamily: "Inter, sans-serif",
        width: "100%",
      };

      return (
        <div style={{ minHeight:"100vh", fontFamily:"Inter,sans-serif", color:"#1a3a1a", padding:"1.5rem" }}>

          {/* Header */}
          <div style={{ marginBottom:"1.5rem", background:"#2d7a2d", borderRadius:"14px", padding:"1.25rem 1.5rem", color:"#ffffff" }}>
            <div style={{ fontSize:"0.7rem", letterSpacing:"0.2em", color:"rgba(255,255,255,0.7)", textTransform:"uppercase", marginBottom:"0.3rem" }}>
              Sugar Hill Primary · Year 5
            </div>
            <h1 style={{ fontSize:"1.6rem", fontWeight:"bold", color:"#ffffff", letterSpacing:"-0.02em" }}>
              Parents' Evening Scheduler
            </h1>
            <div style={{ fontSize:"0.8rem", color:"rgba(255,255,255,0.75)", marginTop:"0.25rem" }}>
              Wed 25th &amp; Thu 26th March · 3:30pm – 5:20pm · {TOTAL_SLOTS} slots total
            </div>
          </div>

          {/* Save / Load */}
          <div style={{ display:"flex", gap:"0.6rem", alignItems:"center", marginBottom:"1.25rem", flexWrap:"wrap" }}>
            <button onClick={saveData} style={{
              background:"#2d7a2d", border:"1px solid #1f5c1f",
              borderRadius:"8px", padding:"0.45rem 1rem", color:"#ffffff",
              cursor:"pointer", fontSize:"0.82rem", fontFamily:"Inter,sans-serif", fontWeight:"bold",
            }}>💾 Save data</button>
            <label style={{
              background:"#ffffff", border:"1px solid #b8d8b8",
              borderRadius:"8px", padding:"0.45rem 1rem", color:"#2d7a2d",
              cursor:"pointer", fontSize:"0.82rem", fontFamily:"Inter,sans-serif", fontWeight:"bold",
            }}>
              📂 Load data
              <input type="file" accept=".json" onChange={loadData} style={{ display:"none" }} />
            </label>
            {saveMsg && (
              <span style={{ fontSize:"0.8rem", color: saveMsg.startsWith("⚠") ? "#c0392b" : "#2d7a2d", fontStyle:"italic" }}>
                {saveMsg}
              </span>
            )}
          </div>

          {/* Stats */}
          <div style={{ display:"flex", gap:"0.75rem", marginBottom:"1.5rem", flexWrap:"wrap" }}>
            {[
              { label:"Slips in",   val: pupils.length,          col:"#2d7a2d" },
              { label:"Placed",     val: placed.length,          col:"#1f5c1f" },
              { label:"Slots free", val: TOTAL_SLOTS - placed.length, col:"#6b7280" },
              { label:"Unplaced",   val: unplaced.length,        col:"#c0392b" },
            ].map(s => (
              <div key={s.label} style={{ background:"#ffffff", border:"1px solid #b8d8b8", borderRadius:"10px", padding:"0.6rem 1rem", minWidth:"90px" }}>
                <div style={{ fontSize:"1.5rem", fontWeight:"bold", color:s.col }}>{s.val}</div>
                <div style={{ fontSize:"0.7rem", color:"#6b7280" }}>{s.label}</div>
              </div>
            ))}
          </div>

          {/* Tabs */}
          <div style={{ display:"flex", gap:"0.5rem", marginBottom:"1.5rem" }}>
            {[["input","📝 Add Slips"],["schedule","📅 Schedule"]].map(([v, label]) => (
              <button key={v} onClick={() => setView(v)} style={{
                background: view===v ? "#2d7a2d" : "#ffffff",
                border: view===v ? "1px solid #1f5c1f" : "1px solid #b8d8b8",
                borderRadius:"8px", padding:"0.5rem 1.25rem",
                color: view===v ? "#ffffff" : "#2d7a2d",
                cursor:"pointer", fontSize:"0.85rem", fontFamily:"Inter,sans-serif", fontWeight: view===v ? "bold" : "normal",
              }}>{label}</button>
            ))}
          </div>

          {/* ── INPUT VIEW ── */}
          {view === "input" && (
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"1.5rem" }}>

              {/* Form */}
              <div style={{ background:"#ffffff", border:"1px solid #b8d8b8", borderRadius:"14px", padding:"1.25rem" }}>
                <h2 style={{ margin:"0 0 1rem", fontSize:"1rem", color:"#1a3a1a", fontWeight:"bold" }}>
                  {editingId !== null ? "✏️ Edit slip" : "➕ New slip"}
                </h2>

                <div style={{ marginBottom:"0.75rem" }}>
                  <label style={{ fontSize:"0.75rem", color:"#4a7a4a", display:"block", marginBottom:"0.3rem", fontWeight:"bold" }}>Pupil name</label>
                  <input value={name} onChange={e => setName(e.target.value)}
                    placeholder="e.g. Amelia Jones" style={inp}
                    onKeyDown={e => e.key === "Enter" && submitPupil()} />
                </div>

                <div style={{ marginBottom:"1rem" }}>
                  <label style={{ fontSize:"0.75rem", color:"#4a7a4a", display:"block", marginBottom:"0.3rem", fontWeight:"bold" }}>Meeting type</label>
                  <div style={{ display:"flex", gap:"0.5rem" }}>
                    {["F2F","Tel"].map(t => (
                      <button key={t} onClick={() => setType(t)} style={{
                        flex:1, padding:"0.5rem",
                        background: type===t ? (t==="F2F" ? "#e8f5e8" : "#fffbe6") : "#f9f9f9",
                        border: type===t ? (t==="F2F" ? "2px solid #2d7a2d" : "2px solid #d4a017") : "1px solid #b8d8b8",
                        borderRadius:"8px",
                        color: type===t ? (t==="F2F" ? "#1f5c1f" : "#8a6800") : "#6b7280",
                        cursor:"pointer", fontFamily:"Inter,sans-serif", fontSize:"0.85rem", fontWeight: type===t ? "bold" : "normal",
                      }}>{t==="F2F" ? "● Face-to-Face" : "✆ Telephone"}</button>
                    ))}
                  </div>
                </div>

                <div style={{ marginBottom:"1rem" }}>
                  <label style={{ fontSize:"0.75rem", color:"#4a7a4a", display:"block", marginBottom:"0.5rem", fontWeight:"bold" }}>Preferences</label>
                  {prefs.map((pref, i) => {
                    const rs = RANK_STYLE[pref.rank] || RANK_STYLE[null];
                    return (
                      <div key={i} style={{ display:"flex", gap:"0.5rem", alignItems:"center", marginBottom:"0.5rem" }}>
                        <select value={pref.rank ?? "null"} onChange={e => updatePref(i,"rank", e.target.value==="null" ? null : Number(e.target.value))}
                          style={{ ...inp, width:"80px", fontSize:"0.75rem", fontWeight:"bold",
                            background: rs.bg, color: rs.color, border:`1px solid ${rs.border}` }}>
                          <option value="null">No pref</option>
                          <option value="1">1st</option>
                          <option value="2">2nd</option>
                          <option value="3">3rd</option>
                        </select>
                        <select value={pref.day} onChange={e => updatePref(i,"day",Number(e.target.value))}
                          style={{ ...inp, width:"auto", flex:1 }}>
                          {DAY_OPTIONS.map((d,di) => <option key={di} value={di}>{d}</option>)}
                        </select>
                        <select value={pref.band ?? ""} onChange={e => updatePref(i,"band", e.target.value==="" ? null : Number(e.target.value))}
                          style={{ ...inp, width:"auto", flex:1 }}>
                          {BAND_OPTIONS.map((bl,bi) => <option key={bi} value={bi===0 ? "" : bi-1}>{bl}</option>)}
                        </select>
                        {prefs.length > 1 && (
                          <button onClick={() => removePref(i)} style={{ background:"none", border:"none", color:"#ef4444", cursor:"pointer", fontSize:"1rem", padding:"0 4px" }}>✕</button>
                        )}
                      </div>
                    );
                  })}
                  <button onClick={addPref} style={{
                    background:"#f0f7f0", border:"1px dashed #4a9e4a",
                    borderRadius:"8px", color:"#2d7a2d", cursor:"pointer",
                    fontSize:"0.8rem", padding:"0.4rem 0.75rem", fontFamily:"Inter,sans-serif",
                    width:"100%", marginTop:"0.25rem",
                  }}>+ Add preference</button>
                </div>

                <button onClick={submitPupil} disabled={!name.trim()} style={{
                  width:"100%", padding:"0.65rem",
                  background: name.trim() ? "#2d7a2d" : "#e8f5e8",
                  border: name.trim() ? "1px solid #1f5c1f" : "1px solid #b8d8b8",
                  borderRadius:"10px", color: name.trim() ? "#ffffff" : "#9ab89a",
                  cursor: name.trim() ? "pointer" : "not-allowed",
                  fontSize:"0.95rem", fontFamily:"Inter,sans-serif", fontWeight:"bold",
                }}>
                  {editingId !== null ? "Update slip" : "Add slip & allocate"}
                </button>
                {editingId !== null && (
                  <button onClick={cancelEdit} style={{
                    width:"100%", padding:"0.5rem", marginTop:"0.5rem",
                    background:"#ffffff", border:"1px solid #b8d8b8",
                    borderRadius:"10px", color:"#6b7280", cursor:"pointer",
                    fontSize:"0.85rem", fontFamily:"Inter,sans-serif",
                  }}>Cancel edit</button>
                )}
              </div>

              {/* Pupil list */}
              <div>
                <h2 style={{ margin:"0 0 0.75rem", fontSize:"1rem", color:"#1a3a1a", fontWeight:"bold" }}>Slips returned ({pupils.length})</h2>
                {pupils.length === 0 ? (
                  <div style={{ border:"2px dashed #b8d8b8", borderRadius:"12px", padding:"3rem 1rem", textAlign:"center", color:"#9ab89a", fontStyle:"italic" }}>
                    No slips yet
                  </div>
                ) : (
                  <div style={{ display:"flex", flexDirection:"column", gap:"0.5rem", maxHeight:"65vh", overflowY:"auto" }}>
                    {pupils.map(p => {
                      const slot = allocation[p.id];
                      const isPlaced = slot !== null;
                      return (
                        <div key={p.id} style={{
                          background: isPlaced ? "#f0faf0" : "#fff5f5",
                          border: isPlaced ? "1px solid #a8d8a8" : "1px solid #f5b8b8",
                          borderRadius:"10px", padding:"0.75rem 1rem",
                          display:"flex", alignItems:"center", gap:"0.75rem",
                        }}>
                          <div style={{ flex:1 }}>
                            <div style={{ display:"flex", alignItems:"center", gap:"0.5rem", flexWrap:"wrap" }}>
                              <span style={{ fontWeight:"bold", fontSize:"0.9rem", color:"#1a3a1a" }}>{p.name}</span>
                              <span style={{
                                fontSize:"0.68rem", padding:"1px 7px", borderRadius:"12px",
                                background: p.type==="F2F" ? "#e8f5e8" : "#fffbe6",
                                color: p.type==="F2F" ? "#1f5c1f" : "#8a6800",
                                border: p.type==="F2F" ? "1px solid #a8d8a8" : "1px solid #e2c96a",
                              }}>{p.type==="F2F" ? "● F2F" : "✆ Tel"}</span>
                            </div>
                            <div style={{ fontSize:"0.75rem", color:"#6b7280", marginTop:"0.2rem" }}>
                              {isPlaced
                                ? `→ ${DAYS[slot.day]} · ${SLOT_TIMES[slot.band][slot.slot]}`
                                : "⚠ Could not be placed"}
                            </div>
                          </div>
                          <button onClick={() => editPupil(p.id)} style={{ background:"none", border:"none", color:"#2d7a2d", cursor:"pointer", fontSize:"0.8rem", fontFamily:"Inter,sans-serif", fontWeight:"bold" }}>Edit</button>
                          <button onClick={() => deletePupil(p.id)} style={{ background:"none", border:"none", color:"#c0392b", cursor:"pointer", fontSize:"0.8rem" }}>✕</button>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            </div>
          )}

          {/* ── SCHEDULE VIEW ── */}
          {view === "schedule" && (
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"1.5rem" }}>
              {DAYS.map((dayLabel, dayIdx) => (
                <div key={dayIdx} style={{ background:"#ffffff", border:"1px solid #b8d8b8", borderRadius:"14px", overflow:"hidden" }}>
                  <div style={{ background:"#2d7a2d", padding:"0.75rem 1rem", fontSize:"0.95rem", fontWeight:"bold", color:"#ffffff", borderBottom:"1px solid #1f5c1f" }}>
                    {dayIdx === 0 ? "Wednesday 25th March" : "Thursday 26th March"}
                  </div>
                  {BAND_LABELS.map((band, bandIdx) => (
                    <div key={bandIdx}>
                      <div style={{ background:"#e8f5e8", padding:"0.4rem 1rem", fontSize:"0.72rem", color:"#1f5c1f", fontWeight:"bold", letterSpacing:"0.05em", borderBottom:"1px solid #c8e8c8" }}>
                        {band}
                      </div>
                      {SLOT_TIMES[bandIdx].map((time, slotIdx) => {
                        const key = `${dayIdx}-${bandIdx}-${slotIdx}`;
                        const appt = grid[key];
                        return (
                          <div key={slotIdx} style={{
                            display:"flex", alignItems:"center", gap:"0.75rem",
                            padding:"0.5rem 1rem",
                            borderBottom:"1px solid #f0f7f0",
                            background: appt ? (appt.type==="F2F" ? "#f0faf0" : "#fffbe6") : "#ffffff",
                          }}>
                            <span style={{ fontSize:"0.78rem", color:"#9ab89a", minWidth:"52px", fontFamily:"monospace" }}>{time}</span>
                            {appt ? (
                              <>
                                <span style={{ fontSize:"0.88rem", fontWeight:"bold", flex:1, color: appt.type==="F2F" ? "#1f5c1f" : "#8a6800" }}>{appt.name}</span>
                                <span style={{
                                  fontSize:"0.68rem", padding:"1px 7px", borderRadius:"10px",
                                  background: appt.type==="F2F" ? "#e8f5e8" : "#fffbe6",
                                  color: appt.type==="F2F" ? "#1f5c1f" : "#8a6800",
                                  border: appt.type==="F2F" ? "1px solid #a8d8a8" : "1px solid #e2c96a",
                                }}>{appt.type==="F2F" ? "● F2F" : "✆ Tel"}</span>
                              </>
                            ) : (
                              <span style={{ fontSize:"0.8rem", color:"#c8e8c8", fontStyle:"italic" }}>—</span>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  ))}
                </div>
              ))}
            </div>
          )}

          {unplaced.length > 0 && (
            <div style={{ marginTop:"1.5rem", background:"#fff5f5", border:"1px solid #f5b8b8", borderRadius:"10px", padding:"0.75rem 1rem", fontSize:"0.85rem", color:"#c0392b" }}>
              ⚠ <strong>{unplaced.length} pupil{unplaced.length > 1 ? "s" : ""} could not be placed</strong> within their available day/time options.{" "}
              {unplaced.map(p => p.name).join(", ")}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
